{% extends "base.html" %}
{% block title %}Login · NetBox Oracle{% endblock %}
{% block content %}
<div class="text-center" style="margin-top: 72px; margin-bottom: 40px;">
  <i class="ti ti-radar-2" style="font-size: 2rem; color: var(--nbo-accent);"></i>
  <h1 style="font-size: 2.5rem; margin-top: .75rem;">Descoberta de rede<br>seu time pode confiar</h1>
  <div class="text-secondary" style="font-size: 1.05rem;">Entre pra cadastrar devices, rodar descobertas e revisar antes de gravar no NetBox</div>
</div>
<div class="row justify-content-center">
  <div class="col col-login">
    <form class="card card-md" method="post" autocomplete="off">
      <div class="card-body">
        <div class="mb-3">
          <label class="form-label">Usuário</label>
          <input type="text" name="username" class="form-control" autofocus required>
        </div>
        <div class="mb-2">
          <label class="form-label">Senha</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <div class="form-footer">
          <button type="submit" class="btn btn-primary w-100">Entrar</button>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
