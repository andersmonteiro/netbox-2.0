{% extends "base.html" %}
{% block title %}Login · NetBox Oracle{% endblock %}
{% block content %}
<div class="row justify-content-center" style="margin-top: 60px;">
  <div class="col col-login">
    <div class="text-center mb-4">
      <i class="ti ti-radar-2" style="font-size: 2.2rem; color: var(--tblr-primary);"></i>
      <h1 class="h2 mt-2">NetBox Oracle</h1>
      <div class="text-secondary">Descoberta de rede</div>
    </div>
    <form class="card card-md" method="post" autocomplete="off">
      <div class="card-body">
        <h2 class="h3 text-center mb-4">Entrar na sua conta</h2>
        <div class="mb-3">
          <label class="form-label">Usuário</label>
          <input type="text" name="username" class="form-control" autofocus required>
        </div>
        <div class="mb-2">
          <label class="form-label">Senha</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <div class="form-footer">
          <button type="submit" class="btn btn-primary w-100">Entrar</button>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
