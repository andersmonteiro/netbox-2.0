{% extends "base.html" %}
{% block title %}Alterar senha · NetBox Oracle{% endblock %}
{% block content %}
<div class="page-header d-print-none">
  <h2 class="page-title">Alterar senha</h2>
  <div class="text-secondary">Troca a senha de login desta interface (não é uma senha do NetBox).</div>
</div>

<div class="row justify-content-center">
  <div class="col-lg-5">
    <form class="card" method="post">
      <div class="card-body">
        <div class="mb-3">
          <label class="form-label required-star">Senha atual</label>
          <input type="password" name="current_password" class="form-control" autocomplete="current-password" required>
        </div>
        <div class="mb-3">
          <label class="form-label required-star">Nova senha</label>
          <input type="password" name="new_password" class="form-control" autocomplete="new-password" minlength="6" required>
          <div class="form-hint">Mínimo de 6 caracteres.</div>
        </div>
        <div class="mb-2">
          <label class="form-label required-star">Confirmar nova senha</label>
          <input type="password" name="confirm_password" class="form-control" autocomplete="new-password" minlength="6" required>
        </div>
      </div>
      <div class="card-footer d-flex">
        <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">Cancelar</a>
        <button type="submit" class="btn btn-primary ms-auto">Salvar nova senha</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
