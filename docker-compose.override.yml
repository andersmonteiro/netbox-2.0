# ==========================================================================
# docker-compose.override.yml
#
# COMO USAR:
#   1. Clone o repositório oficial (sempre a última versão estável, já
#      pronta para build com plugins):
#         git clone -b release https://github.com/netbox-community/netbox-docker.git
#         cd netbox-docker
#   2. Copie para a RAIZ desse repositório clonado (mesmo nível do
#      docker-compose.yml original):
#        - este arquivo (substitui o docker-compose.override.yml.example)
#        - Dockerfile-Plugins
#        - plugin_requirements.txt
#        - a pasta configuration/plugins.py (mescla com a configuration/ existente)
#        - a pasta automation-scripts/
#        - a pasta discovery-ui/
#        - o .env (copiado e preenchido a partir de .env.example)
#   3. docker compose build --no-cache
#   4. docker compose up -d
#
# Este arquivo estende o docker-compose.yml oficial do netbox-docker,
# então toda vez que você der "git pull" no repositório oficial, continua
# recebendo atualizações de segurança/versão do NetBox sem perder as
# customizações abaixo.
# ==========================================================================

services:
  # --------------------------------------------------------------------
  # Substitui a imagem oficial por uma build local com plugins instalados
  # --------------------------------------------------------------------
  netbox:
    image: netbox:latest-plugins
    pull_policy: never
    container_name: netbox
    build:
      context: .
      dockerfile: Dockerfile-Plugins
    ports:
      - "8000:8080"
    env_file:
      - .env
    # Catálogo de fotos de device type (frente/costas) -- mapeia só a
    # subpasta devicetype-images/ dentro do volume de media do NetBox,
    # sem substituir o resto (image-attachments/ etc. continuam no
    # volume nomeado padrão do netbox-docker). Ver README seção 2.5.
    volumes:
      - ./netbox-seed/devicetype-images:/opt/netbox/netbox/media/devicetype-images
    # O healthcheck padrão do netbox-docker (start_period 90s, interval
    # 15s, retries 3 = ~135s de tolerância) é curto demais pra 1ª subida,
    # que roda uma leva grande de migrations e pode levar ~10 minutos.
    # Docker marca o container como "unhealthy" assim que estoura esse
    # prazo -- e é isso que faz o "docker compose up" reportar
    # "Error dependency netbox failed to start" pros serviços que
    # dependem dele (netbox-worker, netbox-housekeeping), mesmo o
    # netbox continuando a subir normalmente por trás. Aumentando
    # "retries" pra 80 (80 x 15s = 1200s = 20min de tolerância depois do
    # start_period), o compose espera o tempo certo sem nunca marcar
    # como falha -- e um "docker compose up -d" comum já funciona sem
    # precisar de nenhum script auxiliar de espera.
    healthcheck:
      test: curl -f http://localhost:8080/login/ || exit 1
      start_period: 90s
      timeout: 3s
      interval: 15s
      retries: 80

  netbox-worker:
    image: netbox:latest-plugins
    pull_policy: never
    container_name: netbox-worker
    env_file:
      - .env

  netbox-housekeeping:
    image: netbox:latest-plugins
    pull_policy: never
    container_name: netbox-housekeeping
    env_file:
      - .env

  # --------------------------------------------------------------------
  # postgres/redis/redis-cache vêm do docker-compose.yml oficial do
  # netbox-docker (não redefinimos o resto do serviço aqui, só o nome
  # do container) -- sem isso o compose usa o padrão
  # "<pasta>-<serviço>-<réplica>" (ex: netbox-docker-postgres-1).
  # --------------------------------------------------------------------
  postgres:
    container_name: postgres

  redis:
    container_name: redis

  redis-cache:
    container_name: redis-cache

  # --------------------------------------------------------------------
  # NetBox Oracle: interface web de descoberta de rede (login simples)
  # -- ver README.md seção 2.4. Build a partir da raiz (context: .)
  # porque o Dockerfile precisa copiar
  # automation-scripts/discovery_core.py, compartilhado com o CLI. O
  # volume abaixo aponta pra mesma pasta discovery_output/ usada pelo
  # CLI (discovery_netbox.py), então um device coletado por um aparece
  # pra revisão no outro. A pasta do código-fonte continua se chamando
  # "discovery-ui/" no disco (organização interna, não aparece pro
  # usuário), mas o serviço/imagem/container agora se chamam todos
  # "netbox-oracle".
  # --------------------------------------------------------------------
  netbox-oracle:
    build:
      context: .
      dockerfile: discovery-ui/Dockerfile
    container_name: netbox-oracle
    restart: unless-stopped
    depends_on:
      - netbox
    environment:
      NETBOX_URL: ${DISCOVERY_UI_NETBOX_URL}
      NETBOX_TOKEN: ${DISCOVERY_UI_NETBOX_TOKEN}
      DISCOVERY_UI_USER: ${DISCOVERY_UI_USER}
      DISCOVERY_UI_PASSWORD: ${DISCOVERY_UI_PASSWORD}
      FLASK_SECRET_KEY: ${DISCOVERY_UI_SECRET_KEY}
    ports:
      - "5050:5050"
    volumes:
      - ./automation-scripts/discovery_output:/app/discovery_output
