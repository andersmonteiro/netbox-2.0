# ==========================================================================
# docker-compose.discovery-ui.yml
#
# Instalação STANDALONE: só a interface web de descoberta (discovery-ui),
# sem subir NetBox/Postgres/Redis/nada -- pra clientes que já têm um
# NetBox rodando (deste template ou de qualquer outra instalação) e só
# querem a ferramenta de descoberta apontando pra ele via API.
#
# Uso (via instalador, recomendado):
#   ./install-discovery-ui.sh
#
# Uso manual:
#   cp .env.discovery-ui.example .env.discovery-ui   # preencha NETBOX_URL/NETBOX_TOKEN
#   docker compose -f docker-compose.discovery-ui.yml --env-file .env.discovery-ui up -d --build
#
# Diferente do docker-compose.override.yml (instalação full), este
# arquivo roda direto da RAIZ deste repositório -- não precisa copiar
# nada pra dentro de um netbox-docker/, porque não tem netbox-docker
# nenhum aqui. automation-scripts/ e discovery-ui/ já são pastas irmãs
# deste arquivo, então o build.context "." já enxerga os dois direto.
# ==========================================================================

services:
  netbox-oracle:
    build:
      context: .
      dockerfile: discovery-ui/Dockerfile
    container_name: netbox-oracle
    restart: unless-stopped
    environment:
      NETBOX_URL: ${NETBOX_URL}
      NETBOX_TOKEN: ${NETBOX_TOKEN}
      DISCOVERY_UI_USER: ${DISCOVERY_UI_USER}
      DISCOVERY_UI_PASSWORD: ${DISCOVERY_UI_PASSWORD}
      FLASK_SECRET_KEY: ${DISCOVERY_UI_SECRET_KEY}
    ports:
      - "5050:5050"
    volumes:
      - ./automation-scripts/discovery_output:/app/discovery_output
      # Socket do Docker do HOST -- usado só pela aba "Serviços" do navbar
      # (status ligado/parado dos containers do NetBox + botão de
      # reiniciar, ver /api/services/* em discovery-ui/app.py). ATENÇÃO:
      # isso dá ao container acesso equivalente a root no Docker da
      # máquina (não só sobre os containers do NetBox) -- é assim que
      # containerizar um painel de controle de containers funciona, não
      # tem meio-termo. Se não quiser essa exposição, comente esta linha;
      # a aba de Serviços cai sozinha pra "indisponível" sem quebrar o
      # resto da aplicação (ver _get_docker_client() em app.py).
      - /var/run/docker.sock:/var/run/docker.sock
